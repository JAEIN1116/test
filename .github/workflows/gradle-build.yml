name: Java CI with Gradle (Local Tomcat Deploy)

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: [self-hosted, windows]
    
    steps:
    - name: 1. 저장소에서 코드 가져오기
      uses: actions/checkout@v4
      
    - name: 2. Java 17 세팅하기
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: 3. Gradle 세팅하기
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5' 
        
    - name: 4. WAR 파일로 빌드하기
      run: gradle build
      
    - name: 5. 톰캣으로 자동 배포하기
      run: Copy-Item -Path "build\libs\*.war" -Destination "D:\apache-tomcat-8.0.32\webapps\ROOT.war" -Force
