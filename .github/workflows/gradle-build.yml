name: Java CI with Gradle (WAR Build)

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 1. 저장소에서 코드 가져오기
      uses: actions/checkout@v4
      
    - name: 2. Java 17 세팅하기
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: 3. Gradle 세팅하기 (gradlew 파일이 없으므로 버전 강제 지정)
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5' 
        
    - name: 4. WAR 파일로 빌드하기
      run: gradle build 
      
    - name: 5. 만들어진 WAR 파일 확인하기
      run: ls -la build/libs/
