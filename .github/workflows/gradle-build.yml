name: Java CI with Gradle (Local Tomcat Deploy)

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: [self-hosted, windows]
    
    steps:
    - name: 0. 기존 구동 중인 서버 종료 (파일 잠금 해제)
      run: |
        $port = 18080
        $tcpConnections = Get-NetTCPConnection -LocalPort $port -State Listen -ErrorAction SilentlyContinue
        if ($tcpConnections) {
            $pidToKill = $tcpConnections[0].OwningProcess
            Stop-Process -Id $pidToKill -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 2
        }
      continue-on-error: true

    - name: 1. 저장소에서 코드 가져오기
      uses: actions/checkout@v4
      
    - name: 2. Java 17 세팅하기
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: 3. Gradle 세팅하기
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5' 
        
    - name: 4. Spring Boot 실행 파일(JAR) 빌드하기
      run: gradle build -x test

    - name: 5. 구동 중인 이전 서버 종료 및 새 서버 백그라운드 실행
      env:
        RUNNER_TRACKING_ID: ""
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        $port = 18080
        $tcpConnections = Get-NetTCPConnection -LocalPort $port -State Listen -ErrorAction SilentlyContinue
        if ($tcpConnections) {
            $pidToKill = $tcpConnections[0].OwningProcess
            Write-Host "포트 $port 를 사용중인 프로세스($pidToKill)를 종료합니다."
            Stop-Process -Id $pidToKill -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 2
        } else {
            Write-Host "포트 $port 를 사용중인 프로세스가 없습니다."
        }
        
        Write-Host "새로운 Spring Boot 서버를 백그라운드에서 시작합니다..."
        # 환경 변수 설정
        $env:GEMINI_API_KEY = "${{ secrets.GEMINI_API_KEY }}"
        
        # -D 옵션으로 스프링 설정값 전달
        Start-Process -FilePath "java" -ArgumentList "-Dgemini.api.key=$env:GEMINI_API_KEY", "-jar", "build\libs\test-1.0.jar" -WindowStyle Hidden
        Write-Host "서버 배포 완료!"
