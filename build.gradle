plugins {
    id 'java'
    id 'war'
    id 'org.gretty' version '3.1.1' // 로컬 톰캣 테스트용 플러그인
}

version = '1.0'

repositories {
    mavenCentral()
}

dependencies {
    providedCompile 'javax.servlet:javax.servlet-api:4.0.1'
    providedCompile 'javax.servlet.jsp:javax.servlet.jsp-api:2.3.3'
}

gretty {
    httpPort = 8080
    contextPath = '/'
    servletContainer = 'tomcat9'
}
